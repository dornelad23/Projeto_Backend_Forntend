<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem Vindo ao Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <footer class="topo">
        <div class="container">
            <img src="img/CRVascodaGama.png" alt="Logo Seduc" class="logo-rodape">
            <ul class="social">

                <li>
                    <a href="http://facebook.com">
                        <img src="img/i-facebook.png" alt="Facebook"> Facebook
                    </a>
                </li>

                <li>
                    <a href="http://twitter.com/">
                        <img src="img/i-twitter.png" alt="Twitter"> Twitter
                    </a>
                </li>

                <li>
                    <a href="http://instagram.com/">
                        <img src="img/i-insta.png" alt="Instagram"> Instagram
                    </a>
                </li>

                <li>
                    <a href="http://youtube.com/">
                        <img src="img/i-youtube.png" alt="Youtube"> Youtube
                    </a>
                </li>

                <li>
                    <a href="http://linkedin.com/">
                        <img src="img/i-linkedin.png" alt="Linkedin"> Linkedin
                    </a>
                </li>
            </ul>
        </div>
    </footer>
    
<header class="topo">

<div id="Logo_Educacao"></div>

<div id="Logo_Imagem">

    <img src="img/logo_dourado_vasco.png" alt="Logo Governo">

</div>

<div id="Logo_Gov"></div>

</header>

<div class="login-container">

    <h2>Login</h2>

    <form id="frmLogin" class="form">

<div class="field">

    <label>Email</label>

    <input class="input" type="email" id="email" placeholder="Insira o seu e-mail">

</div>

<div class="field">

    <label>Senha</label>
    <input class="input" type="password" id="senha" placeholder="Insira a sua senha">

</div>

<button class="btn" type="submit">

    <span class="btn-text">Entrar</span>
    <span class="loader-dots">
    <span></span>
    <span></span>
    <span></span>
    
</span>

</button>

<div class="msg" id="msg"></div>

</form>

</div>

<script src="script.js"></script>

</body>

</html>
